server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: demo
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/solaraivle?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: aivle
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # Hibernate 테이블 생성 완료 후 data.sql 실행
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true