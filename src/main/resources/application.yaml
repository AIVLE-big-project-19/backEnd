server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: demo
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/solaraivle?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: aivle
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # Hibernate 테이블 생성 완료 후 data.sql 실행
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:changeme@gmail.com}
    password: ${MAIL_PASSWORD:changeme-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-please-override-in-real-env-32bytes-min}
  access-token-validity-ms: 1800000
  refresh-token-validity-ms: 86400000
  refresh-token-remember-me-validity-ms: 1209600000

google:
  client-id: ${GOOGLE_CLIENT_ID:changeme.apps.googleusercontent.com}
  client-secret: ${GOOGLE_CLIENT_SECRET:changeme-google-client-secret}

terms:
  version: "1.0"